---
hostservices_packages_dir: /usr/local/lib/python3.11/dist-packages/host_modules
handlers:
  - name: reboot
    serviceName: org.SONiC.HostService.reboot
    objectPath: /org/SONiC/HostService/reboot
    method: issue_reboot
    builtin: true
    args:
      - name: delay_secs
        type: i
        value: 0
  - name: save_config
    serviceName: org.SONiC.HostService.config
    objectPath: /org/SONiC/HostService/config
    method: save
    builtin: true
    args:
      - name: default_config
        type: s
        value: "/etc/sonic/config_db.json"
  - name: onie
    serviceName: org.SONiC.HostService.onie
    objectPath: /org/SONiC/HostService/onie
    method: set_install_mode
    builtin: false
  - name: systemd_restart
    serviceName: org.SONiC.HostService.systemd
    objectPath: /org/SONiC/HostService/systemd
    method: restart_service
    builtin: true
    ignore_codes: [-15]